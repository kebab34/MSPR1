services:
  # API FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mspr_api
    # Linux : sans ceci, host.docker.internal ne se résout pas → erreur DNS / 500 sur les routes Supabase
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Hôte : API exposée sur 8001 vers le port interne 8000.
      - "8001:8000"
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - etl
    restart: unless-stopped
    networks:
      - mspr_network

  # Interface web Next.js (proxy API vers le service `api`)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mspr_web
    ports:
      # Hôte : défaut 8000. Pour un autre port, utiliser WEB_PORT dans `.env`.
      - "${WEB_PORT:-8000}:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mspr_network

  # Service ETL
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: mspr_etl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-}
      - KAGGLE_KEY=${KAGGLE_KEY:-}
      # Planification cron (5 champs). Défaut : lundi 02h00 UTC.
      - ETL_SCHEDULE=${ETL_SCHEDULE:-0 2 * * 1}
    volumes:
      - ./etl:/app
      - ./etl/data:/app/data
      - ./etl/logs:/app/logs
    command: python scheduler.py
    networks:
      - mspr_network
    restart: unless-stopped

networks:
  mspr_network:
    driver: bridge

volumes:
  etl_data:
    driver: local


