services:
  # API FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mspr_api
    # Linux : sans ceci, host.docker.internal ne se résout pas → erreur DNS / 500 sur les routes Supabase
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Hôte : API exposée sur 8001 vers le port interne 8000.
      - "8001:8000"
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - etl
    restart: unless-stopped
    networks:
      - mspr_network

  # Interface web Next.js (proxy API vers le service `api`)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mspr_web
    # Même principe que l’API : passer par l’hôte (port publié 8001) si le trafic
    # conteneur→conteneur est filtré (iptables/UFW), ce qui provoquait timeout/HTTP 500.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Hôte : défaut 8000. Pour un autre port, utiliser WEB_PORT dans `.env`.
      - "${WEB_PORT:-8000}:3000"
    environment:
      - API_URL=http://host.docker.internal:8001
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mspr_network

  # Service ETL
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: mspr_etl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - ETL_SCHEDULE=${ETL_SCHEDULE:-0 */6 * * *}
    volumes:
      - ./etl:/app
      - ./etl/data:/app/data
    # Ne pas utiliser `scheduler.py run` ici : le processus se termine et, avec
    # restart: unless-stopped, Docker redémarre en boucle → "restarting", exec impossible.
    # Lancement manuel une fois : docker compose exec etl python scheduler.py run
    networks:
      - mspr_network
    restart: unless-stopped

networks:
  mspr_network:
    driver: bridge

volumes:
  etl_data:
    driver: local


